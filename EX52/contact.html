<html>
    <head>
        <title>Contact</title>
        <style type="text/css">
            input{
                width: 95%
            }
        </style>
    </head>
    <body >
      <h3>Contact the editorial office</h3>
      <form method="get">
            <table width=500>
                <tr>
                    <td colspan="2">
                    Full name
                    <br>
                    <input type="text" name="fullname">
                    </td>
                </tr>
                <tr>
                    <td>
                    Email
                    <br>
                    <input type="email" name="fullname">
                    </td>
                    <td >
                    Send to
                    <br>
                    <select style="width: 90%;">
                        <option value="edit">Editprial board</option>
                        <option value="news">News Department</option>
                        <option value="board"> Board os Pespectives</option>
                        <option value="world">World Board</option>
                        <option value="busi"> Business Department</option>

                    </select>
                    </td>
                </tr>
                <tr>
                    <td colspan="2">
                    Title
                    <br>
                    <input type="text" name="title">
                    </td>
                </tr>
                <tr>
                    <td colspan="2" >
                        Content
                        <br>
                        <input type="text" name="content" style="height: 200px">
                    </td>
                </tr>
                <tr>
                    <td colspan="2">
                        <br>
                        <input type="submit" name="submit" value="Send" style="background-color: rgb(135, 39, 39); color: white; width: 20%;border-radius: 5px;">
                    </td>
                </tr>
            </table>
      </form>
    </body>
</html>
