<html>
    <head>
        <title>Registration</title>
        <style type="text/css">
            p{
                color: white;
            }
        </style>
    </head>
    <body style="background-color: rgb(72, 189, 150);">
      <div align="center">
            <img src="images/Logo.gif">
      </div>
      <h1 style="color: white; text-align: center;"> Newborn Registration
      </h1>
      <p>
        Date:
        <input type="date" name="date">
      </p>
      <p>
        1&#41; Infant's first name: 
        <input type="text" name="first"> 
        Last:
        <input type="text" name="last">
      </p>
      <p>
        2&#41; Medical Record #: 
        <input type="text" name="record">
      </p>
      <p>
        3&#41; Date of birth:
        <input type="date" name="dob">
      </p>
      <p>
        4&#41; Birth weight:
        <input type="number" name="birthwei" style="width: 100;">
      </p>
      <p>
        5&#41; APGAR score:
        <input type="number" name="score" style="width: 50;">
      </p>
      <p>
        6&#41; Mother's first name:
        <input type="text" name="momfirst">
        Last:
        <input type="text" name="momlast">
      </p>
       <p>
        7&#41; Father's first name:
        <input type="text" name="dadfirst">
        Last:
        <input type="text" name="dadlast">
      </p>
        <table style="color:white">
            <tr>
                <td valign="top">
                    8&#41; Physician (check all that apply:)
                </td>
                <td valign="top">
                    <select size="4" >
                    <option value="wan">Dr: Warren Albert</option>
                    <option value="maria">Dr: Maria Alvarez</option>
                    <option value="karen">Dr: Karen Brinkman</option>
                    <option value="micheal">Dr: Micheal Kerry</option>
                    </select>
                </td>
                <td>
                </td>
            </tr>
            </table>
            <p align="center">
                <input type="submit" name="regis" value="Register">
                <input type="reset" name="cancel" value="Cancel">
            </p>
        </body>
</html>
